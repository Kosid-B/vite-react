<!doctype html><html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { background:#000; }
  .frame {
    width:1000px; height:1000px; position:relative; overflow:hidden;
    background:
      radial-gradient(680px 560px at 50% 34%, #17284a 0%, #0d1730 46%, #0a0f1c 74%);
    font-family: "Arial", system-ui, sans-serif;
  }
  /* corner glow */
  .glowA { position:absolute; width:640px; height:520px; top:-120px; right:-140px;
    background:radial-gradient(circle, rgba(245,158,11,.22), transparent 62%); }
  .glowB { position:absolute; width:660px; height:540px; bottom:-160px; left:-160px;
    background:radial-gradient(circle, rgba(34,211,238,.18), transparent 62%); }
  /* faint grid */
  .grid { position:absolute; inset:0; opacity:.5;
    background-image:linear-gradient(rgba(40,60,100,.28) 1px,transparent 1px),
                     linear-gradient(90deg, rgba(40,60,100,.28) 1px,transparent 1px);
    background-size:64px 64px;
    -webkit-mask-image:radial-gradient(circle at 50% 42%, #000 44%, transparent 74%); }

  .center { position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:0; }

  /* robot emblem */
  .emblem { filter: drop-shadow(0 14px 40px rgba(34,211,238,.30)); margin-bottom:34px; }

  .wordmark { text-align:center; line-height:1; }
  .wm-main { font-size:150px; font-weight:900; letter-spacing:-4px; }
  .wm-ceo { color:#ffffff; }
  .wm-ai  { color:#f59e0b; }
  .wm-sub { margin-top:20px; font-size:38px; font-weight:800; letter-spacing:16px;
    color:#67e8f9; padding-left:16px; }
  .wm-tag { margin-top:16px; font-size:26px; font-weight:600; letter-spacing:2px;
    color:#93a6c8; }
</style></head>
<body>
  <div class="frame">
    <div class="glowA"></div>
    <div class="glowB"></div>
    <div class="grid"></div>
    <div class="center">
      <!-- Robot / AI-team emblem -->
      <svg class="emblem" width="300" height="300" viewBox="0 0 300 300" fill="none">
        <defs>
          <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#22d3ee"/>
            <stop offset="1" stop-color="#f59e0b"/>
          </linearGradient>
          <linearGradient id="head" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#12203c"/>
            <stop offset="1" stop-color="#0c1730"/>
          </linearGradient>
        </defs>
        <!-- outer ring -->
        <circle cx="150" cy="150" r="140" stroke="url(#ring)" stroke-width="6" opacity="0.85"/>
        <!-- antenna (leader signal = CEO) -->
        <line x1="150" y1="70" x2="150" y2="42" stroke="#f59e0b" stroke-width="7" stroke-linecap="round"/>
        <circle cx="150" cy="34" r="12" fill="#f59e0b"/>
        <!-- head -->
        <rect x="78" y="74" width="144" height="120" rx="30" fill="url(#head)" stroke="#22d3ee" stroke-width="5"/>
        <!-- eyes -->
        <circle cx="120" cy="132" r="15" fill="#22d3ee"/>
        <circle cx="180" cy="132" r="15" fill="#22d3ee"/>
        <!-- mouth / smile -->
        <path d="M116 166 Q150 186 184 166" stroke="#67e8f9" stroke-width="7" stroke-linecap="round" fill="none"/>
        <!-- side ears -->
        <rect x="62" y="120" width="12" height="34" rx="6" fill="#22d3ee"/>
        <rect x="226" y="120" width="12" height="34" rx="6" fill="#22d3ee"/>
        <!-- body / team base -->
        <path d="M96 214 Q150 196 204 214 L204 236 Q150 252 96 236 Z" fill="#12203c" stroke="#f59e0b" stroke-width="4"/>
      </svg>

      <div class="wordmark">
        <div class="wm-main"><span class="wm-ceo">CEO</span> <span class="wm-ai">AI</span></div>
        <div class="wm-sub">THAILAND</div>
        <div class="wm-tag">จ้างทีม AI ทั้งบริษัท</div>
      </div>
    </div>
  </div>
</body></html>

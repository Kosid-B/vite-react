<!-- ============================================================================
  b-tctraining.com → ceoaithailand.org · Bridge Auto-Inject (ติดครั้งเดียวทั้งเว็บ)
  ----------------------------------------------------------------------------
  แทนที่จะแปะการ์ด HTML ทีละหน้า 6 ครั้ง → ติดสคริปต์นี้ "ครั้งเดียว" ในโค้ดกลางของเว็บ
  แล้วมันจะ: ตรวจ URL ของหน้า → เลือกการ์ดที่ตรงเรื่อง → แทรกท้ายเนื้อหาให้อัตโนมัติ + ยิง tracking

  ── วิธีติดตั้งใน R-Web CMS (ยืนยันตำแหน่งจากหลังบ้านจริง ก.ค. 2569) ──────
  1) หลังบ้าน R-Web → เมนู "ตั้งค่า" (ไอคอนประแจ) → เมนูซ้าย "โค้ด และสคริปต์"
     (อยู่ใต้ "เครื่องมือของ Google" — ช่องแทรกสคริปต์ส่วนท้ายทั้งเว็บ)
  2) ก๊อป <script>...</script> ทั้งก้อนด้านล่าง → วาง → กด "บันทึก"
  3) เสร็จ! เปิดหน้า สร้างธุรกิจ / มอก. / BCMS / ที่ปรึกษา ดู → การ์ดจะโผล่ท้ายบทความเอง
     (ถ้าไม่มีช่อง "โค้ด และสคริปต์" — ใช้แผน B: แปะการ์ดทีละหน้าจากไฟล์ btctraining-iso-bridge-cards.html)

  ── ปรับแต่ง (ถ้าการ์ดแทรกผิดที่) ──────────────────────────────────────
  แก้ค่า TARGET ในสคริปต์ให้ตรง container เนื้อหาบทความของธีมคุณ
  (เปิดหน้าเว็บ → คลิกขวาที่เนื้อหา → Inspect → ดู class ของกล่องบทความ เช่น .entry-content)

  ── tracking ──────────────────────────────────────────────────────────
  ยิง GA4 gtag('event','bridge_click',{link_id}) [ต้องมี GA4 บนเว็บ — มีอยู่แล้ว]
  + LINE _lt StartClick [ถ้ามี LINE tag] · ทุกอย่าง try/catch ปลอดภัย
  ============================================================================ -->

<script>
(function () {
  // ---- ปรับตรงนี้ได้ ----
  var TARGET = 'article, .entry-content, .post-content, .article-content, .content-detail, main';
  var ORIGIN = 'https://ceoaithailand.org/start';
  var LINE_TAG = 'afc2c605-4307-45cc-b400-35bba3844d21';

  // ---- คอนฟิกการ์ดต่อหน้า (เรียงเฉพาะ→กว้าง สำคัญ — first match wins) ----
  // ปรับให้ตรงหน้าจริงของ b-tctraining จาก sitemap.xml (ก.ค. 2569)
  var RULES = [
    { key:'srang-thurakij', test:/สร้างธุรกิจ|start-business|build-business|เริ่มธุรกิจ/i,
      h:'เริ่มต้นธุรกิจ? จ้าง "ทีม AI ทั้งบริษัท" มาช่วยตั้งแต่วันแรก',
      s:'CEO · การตลาด · การเงิน · ผู้ช่วยประเมินระบบ ISO — ทีม AI ช่วยคุณ 24 ชม. สั่งงานภาษาไทย เริ่มฟรี ไม่ต้องใช้บัตร', b:'เริ่มฟรี' },
    // มอก./TIS → ชี้ไป TIS Automate (ผลิตภัณฑ์แยกที่ทำ มอก. จริง) ผ่าน url/eyebrow override
    { key:'tisi_mok',  test:/มอก|tisi|ใบอนุญาต|มาตรฐานผลิตภัณฑ์/i,
      url:'https://tis-automate.vercel.app/?ref=btctraining&utm_source=btctraining&utm_medium=content_card&utm_campaign=tisi_mok',
      eyebrow:'TIS AUTOMATE · เตรียมพร้อมขอ มอก.',
      h:'ขอ มอก. เริ่มยังไง? เช็กความพร้อม + Gap ฟรีใน 5 นาที',
      s:'ประเมินความพร้อมยื่น มอก. + Gap Analysis 25 ข้อ + เอกสาร 12 รายการ + ขั้นตอนยื่น — โดยที่ปรึกษาไทย 20 ปี เริ่มใช้ฟรี ไม่ต้องสมัคร', b:'เช็กฟรี' },
    // BCMS/BCP → ชี้ไป bcp.theossphere.com (ระบบ BCM เฉพาะทาง) ผ่าน url/eyebrow override
    { key:'bcms',      test:/bcms|iso.?22301|business-continuity|bcp|ความต่อเนื่องทางธุรกิจ/i,
      url:'https://bcp.theossphere.com/?ref=btctraining&utm_source=btctraining&utm_medium=content_card&utm_campaign=bcms',
      eyebrow:'BCP · ระบบจัดการความต่อเนื่องทางธุรกิจ',
      h:'วางระบบ BCM / ISO 22301 ให้พร้อม audit — ครบในที่เดียว',
      s:'เครื่องมือเฉพาะทางด้านความต่อเนื่องทางธุรกิจ (BCP/BCM) สำหรับองค์กร — โดยที่ปรึกษาไทย 20 ปี เริ่มใช้ได้เลย', b:'เปิดระบบ BCM' },
    { key:'training',  test:/training|ฝึกอบรม|อบรม/i,
      h:'อบรมแล้ว รู้ต่อว่าองค์กรพร้อมกี่ % — ด้วย AI',
      s:'AI ประเมินความพร้อม ISO + ชี้ว่ายังขาดเอกสารอะไรก่อน audit เอาความรู้จากคอร์สไปลงมือต่อตรงจุด · เริ่มฟรี', b:'ลองฟรี' },
    { key:'consultant',test:/consultant|ที่ปรึกษา/i,
      h:'ยังไม่พร้อมจ้างที่ปรึกษาเต็ม? เริ่มด้วยเครื่องมือประเมินฟรี',
      s:'รู้จุดที่ต้องแก้ก่อนคุยกับที่ปรึกษา — AI ที่รวมประสบการณ์ที่ปรึกษาไทย 20 ปี · เริ่มฟรี', b:'เริ่มฟรี' },
    { key:'article',   test:/บทความ|คลังความรู้|knowledge|article/i,
      h:'อ่านจบแล้ว ลองให้ AI ช่วยลงมือทำจริง',
      s:'ทีม AI ช่วยประเมินความพร้อม ISO + วางแผนธุรกิจ สั่งงานภาษาไทย — เริ่มฟรี ไม่ต้องใช้บัตร', b:'ลองฟรี' },
    // เผื่ออนาคต (ถ้าเพิ่มหน้า PDPA/BMC — กฎพร้อมทำงานทันที)
    { key:'pdpa',      test:/pdpa|คุ้มครองข้อมูล/i,
      h:'ดูแลเรื่อง PDPA อย่างเป็นระบบ — เริ่มด้วยที่ปรึกษา 20 ปี',
      s:'ปรึกษาแนวทางทำ PDPA ให้ครบ + ทีม AI ช่วยวางแผนงาน — เริ่มฟรี ไม่ต้องใช้บัตร', b:'เริ่มฟรี' },
    { key:'bmc',       test:/business-model|bmc|แผนธุรกิจ/i,
      h:'ทำ Business Model Canvas + แผนธุรกิจ ด้วยทีม AI ฟรี',
      s:'ให้ทีม AI (CEO/การตลาด/การเงิน) ช่วยร่าง BMC + วิเคราะห์ธุรกิจ แล้ววัดผลจริง — เริ่มฟรี', b:'เริ่มฟรี' }
  ];

  function run() {
    try {
      if (document.getElementById('ceoai-bridge-card')) return;    // กันแทรกซ้ำ (ID แยกจาก floating banner ceoai-bridge)
      var path = decodeURIComponent(location.pathname).toLowerCase();
      var r = null;
      for (var i = 0; i < RULES.length; i++) { if (RULES[i].test.test(path)) { r = RULES[i]; break; } }
      if (!r) return;                                              // หน้านี้ไม่เข้าเงื่อนไข → ไม่แทรก

      var target = document.querySelector(TARGET) || document.body;
      // url/eyebrow override รายกฎ (เช่น มอก. ชี้ไป TIS Automate) ไม่งั้น default = CEO AI Thailand /start
      var url = r.url || (ORIGIN + '?ref=btctraining&utm_source=btctraining&utm_medium=content_card&utm_campaign=' + r.key);
      var eyebrow = r.eyebrow || 'CEO AI THAILAND · เครื่องมือฟรี';

      var card = document.createElement('div');
      card.id = 'ceoai-bridge-card';
      // ธีมสว่าง+ฟ้า ให้กลมกลืนกับเว็บ b-tctraining (พื้นขาว หัวข้อฟ้า ปุ่ม CTA ส้ม)
      card.style.cssText = 'margin:26px 0;background:linear-gradient(135deg,#eaf3fc,#f5f9fd);border:1px solid #cfe0f2;border-radius:16px;padding:22px;color:#334155;display:flex;gap:18px;align-items:center;flex-wrap:wrap;font-family:inherit;box-shadow:0 6px 20px rgba(46,121,192,.08)';
      card.innerHTML =
        '<div style="flex:1;min-width:240px">' +
          '<div style="font-size:12px;font-weight:800;letter-spacing:1px;color:#2e79c0">' + eyebrow + '</div>' +
          '<div style="font-size:19px;font-weight:800;margin:6px 0 4px;color:#1e5fa0">' + r.h + '</div>' +
          '<div style="font-size:14px;color:#5b6b82">' + r.s + '</div>' +
        '</div>' +
        '<a href="' + url + '" target="_blank" rel="noopener" id="ceoai-bridge-card-cta" ' +
          'style="flex:none;background:#f59e0b;color:#ffffff;font-weight:800;font-size:16px;text-decoration:none;padding:14px 26px;border-radius:12px;box-shadow:0 6px 18px rgba(245,158,11,.35)">' + r.b + ' →</a>';

      target.appendChild(card);

      var a = document.getElementById('ceoai-bridge-card-cta');
      a.addEventListener('click', function () {
        try { window.gtag && gtag('event', 'bridge_click', { link_id: r.key }); } catch (e) {}
        try { window._lt && _lt('send', 'cv', { type: 'StartClick' }, [LINE_TAG]); } catch (e) {}
      });
    } catch (e) { /* เงียบ — ไม่ให้กระทบหน้าเว็บ */ }
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run);
  else run();
})();
</script>

  <text x="840" y="508" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0">🔍 SEO Marketplace Agent</text>

  <!-- Domain watermark -->
  <text x="600" y="600" font-family="Arial, sans-serif" font-size="18" fill="#334155" text-anchor="middle">ceoaithailand.org</text>

  <rect x="820" y="340" width="28" height="28" rx="3" fill="#1d4ed8" opacity="0.7"/>
  <rect x="860" y="320" width="28" height="48" rx="3" fill="#1d4ed8" opacity="0.8"/>
  <rect x="900" y="305" width="28" height="63" rx="3" fill="#1d4ed8" opacity="0.9"/>
  <rect x="940" y="295" width="28" height="73" rx="3" fill="#2563eb"/>
  <rect x="980" y="280" width="28" height="88" rx="3" fill="#3b82f6"/>
  <rect x="1020" y="270" width="28" height="98" rx="3" fill="#60a5fa"/>

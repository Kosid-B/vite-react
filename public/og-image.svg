  <!-- Sub tagline EN -->
  <text x="80" y="435" font-family="Arial, sans-serif" font-size="22" fill="#64748b">Automated AI Company for Thai SMEs</text>

  <!-- Stats row -->
  <rect x="80" y="490" width="200" height="70" rx="12" fill="#1e293b"/>
  <text x="180" y="522" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">เริ่มต้น</text>
  <text x="180" y="548" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#22d3ee" text-anchor="middle">฿1,490/เดือน</text>

  <rect x="300" y="490" width="200" height="70" rx="12" fill="#1e293b"/>
  <text x="400" y="522" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">ทดลองฟรี</text>
  <text x="400" y="548" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#22d3ee" text-anchor="middle">15 วัน</text>

  <rect x="520" y="490" width="200" height="70" rx="12" fill="#1e293b"/>
  <text x="620" y="522" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">AI Models</text>
  <text x="620" y="548" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#22d3ee" text-anchor="middle">20+ ฟีเจอร์</text>

  <!-- Right side visual -->
  <!-- Dashboard mockup -->

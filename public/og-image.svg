  <text x="960" y="298" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Revenue Trend ↑</text>

  <!-- AI agents list -->
  <rect x="800" y="398" width="320" height="120" rx="8" fill="#1e293b"/>
  <circle cx="820" cy="420" r="8" fill="#22c55e"/>
  <text x="840" y="424" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0">🤖 ISO 9001 Compliance Agent</text>
  <circle cx="820" cy="448" r="8" fill="#22c55e"/>
  <text x="840" y="452" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0">📊 Financial Forecast Agent</text>
  <circle cx="820" cy="476" r="8" fill="#f59e0b"/>
  <text x="840" y="480" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0">🎯 GTM Strategy Agent</text>

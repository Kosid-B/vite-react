  <!-- Left content -->
  <!-- Logo icon placeholder -->
  <rect x="80" y="200" width="56" height="56" rx="12" fill="#c44b2b"/>
  <text x="108" y="240" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">AI</text>

  <!-- Brand name -->
  <text x="80" y="330" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="white">CEO AI Thailand</text>

  <!-- Tagline TH -->

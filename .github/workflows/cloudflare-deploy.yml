name: Deploy to Cloudflare Workers (production)

# Production จริง = Cloudflare Worker (ceo-ai-thailand) ผูก custom domain ceoaithailand.org
# ก่อนหน้านี้ต้อง `npx wrangler deploy` เอง → ตอนนี้ auto-deploy เมื่อ merge เข้า main
# (deploy.yml → GitHub Pages = legacy · ไม่ใช่ host จริง)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc + vite)
        run: npm run build
        env:
          # ตั้งใน repo: Settings → Secrets and variables → Actions (ชุดเดียวกับ deploy.yml)
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy Worker + assets to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

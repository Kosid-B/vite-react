name: CI

# ตาข่ายกัน regression: build + test ต้องผ่านก่อน merge เข้า main
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (tsc + vite)
        run: npm run build

      - name: Unit tests
        run: npm run test:run
